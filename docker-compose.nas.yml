# Synology NAS overrides
# 用法：docker compose -f docker-compose.yml -f docker-compose.nas.yml up -d
#
# - 限制每個 container 的記憶體上限，避免吃滿 NAS
# - Postgres 配 shared_buffers，給較高效能但仍保守
services:
  db:
    shm_size: 256mb
    deploy:
      resources:
        limits:
          memory: 1g
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "effective_cache_size=512MB"

  api:
    deploy:
      resources:
        limits:
          memory: 512m

  web:
    deploy:
      resources:
        limits:
          memory: 128m

  scheduler:
    deploy:
      resources:
        limits:
          memory: 512m

  # Cloudflare Quick Tunnel — 把內部 API 用 HTTPS 暴露到外網
  # 容器啟動後 log 會出現一行 trycloudflare.com 的 URL，那就是公網 API 入口
  # 注意：Quick Tunnel 的 URL 每次重啟會變；穩定 URL 需自己的網域 (Named Tunnel)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: havehouse-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://api:8000
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 64m
