services:
  db:
    image: postgis/postgis:16-3.4
    container_name: havehouse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-havehouse}
      POSTGRES_USER: ${POSTGRES_USER:-havehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      TZ: Asia/Taipei
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./etl/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: havehouse-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-havehouse}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-havehouse}
      TZ: Asia/Taipei
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"

  etl:
    build: ./etl
    container_name: havehouse-etl
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-havehouse}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-havehouse}
      TZ: Asia/Taipei
      DATA_DIR: /data
    volumes:
      - etl_cache:/data
    depends_on:
      db:
        condition: service_healthy
    profiles: ["etl"]

  scheduler:
    build: ./etl
    container_name: havehouse-scheduler
    restart: unless-stopped
    command: python -m etl.scheduler
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-havehouse}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-havehouse}
      TZ: Asia/Taipei
      DATA_DIR: /data
      RUN_ON_START: ${RUN_ON_START:-false}
    volumes:
      - etl_cache:/data
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    container_name: havehouse-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  db_data:
  etl_cache:
